<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🎓 App</h2>
        <ul>
            <li class="active">Students</li>
            <li>Dashboard</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Top Bar -->
        <div class="topbar">
            <h2>Student Management</h2>
            <button onclick="openModal()">+ Add Student</button>
        </div>

        <!-- Search -->
        <input type="text" id="search" placeholder="Search students..." onkeyup="searchStudent()">

        <!-- Table Card -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Marks</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Add / Edit Student</h3>
        <input type="number" id="id" placeholder="ID">
        <input type="text" id="name" placeholder="Name">
        <input type="number" id="marks" placeholder="Marks">
        <button onclick="addOrUpdateStudent()">Save</button>
        <button onclick="closeModal()" class="cancel">Cancel</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
